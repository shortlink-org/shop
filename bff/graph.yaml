# Cosmo Router Subgraph Configuration
# Used by `wgc router compose` to generate router execution config

version: 1

subgraphs:
  # Cart and order operations via Cosmo Connect gRPC subgraph.
  - name: carts
    routing_url: dns:///localhost:4011
    grpc:
      schema_file: ../oms-graphql/pkg/graph/schema.graphql
      proto_file: ../oms-graphql/pkg/proto/service/v1/service.proto
      mapping_file: ../oms-graphql/pkg/proto/service/v1/mapping.json

  # Admin API via Cosmo Connect gRPC subgraph.
  - name: admin
    routing_url: dns:///localhost:4012
    grpc:
      schema_file: ../admin-graphql/pkg/graph/schema.graphql
      proto_file: ../admin-graphql/pkg/proto/service/v1/service.proto
      mapping_file: ../admin-graphql/pkg/proto/service/v1/mapping.json

  # Delivery API via Cosmo Connect gRPC subgraph.
  - name: delivery
    routing_url: dns:///localhost:4013
    grpc:
      schema_file: subgraphs/delivery/schema.graphql
      proto_file: subgraphs/delivery/service.proto
      mapping_file: subgraphs/delivery/mapping.json

  # Countries (external GraphQL API)
  - name: countries
    routing_url: https://countries.trevorblades.com/
    introspection:
      url: https://countries.trevorblades.com/
