type Address {
  street: String
  city: String
  country: String
  latitude: Float
  longitude: Float
}

type RandomAddressResponse {
  address: Address
}

type DeliveryLocation {
  latitude: Float
  longitude: Float
}

type DeliveryCourier {
  courierId: String
  name: String
  phone: String
  transportType: String
  status: String
  currentLocation: DeliveryLocation
  lastActiveAt: String
}

type DeliveryTracking {
  orderId: String
  packageId: String
  status: String
  courier: DeliveryCourier
  estimatedMinutesRemaining: Int
  distanceKmRemaining: Float
  estimatedArrivalAt: String
  assignedAt: String
  deliveredAt: String
}

type Query {
  randomAddress: RandomAddressResponse!
  deliveryTracking(orderId: String!): DeliveryTracking
}
