version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      module: buf.build/shortlink-org/shop-delivery-rpc
      value: github.com/shortlink-org/shop/delivery-graphql/pkg/generated
plugins:
  - remote: buf.build/protocolbuffers/go
    out: pkg/generated
    opt: paths=source_relative
  - remote: buf.build/grpc/go
    out: pkg/generated
    opt: paths=source_relative
  - remote: buf.build/connectrpc/go
    out: pkg/generated
    opt: paths=source_relative
