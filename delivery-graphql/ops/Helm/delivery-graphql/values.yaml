# Common default values for delivery-graphql.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# -- Pods Service Account
# @ignored ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/
serviceAccount:
  create: true

# ==============================================================================
ingress:
  enabled: false

# ==============================================================================
httpRoute:
  enabled: false

# ==============================================================================
deploy:
  replicaCount: 1

  imagePullSecrets: []

  env:
    LISTEN_ADDR: "0.0.0.0:4013"
    # Delivery gRPC URL (host:port, no scheme)
    DELIVERY_GRPC_URL: "shortlink-shop-delivery.shortlink-shop:50051"
    OTEL_EXPORTER_OTLP_ENDPOINT: http://grafana-tempo.grafana.svc.cluster.local:4318

  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 32Mi

  # -- Annotations to be added to controller pods
  annotations: {}

  image:
    repository: registry.gitlab.com/shortlink-org/shop/delivery-graphql
    tag: latest
    # -- Global imagePullPolicy
    # Default: 'Always' if image tag is 'latest', else 'IfNotPresent'
    # Ref: http://kubernetes.io/docs/user-guide/images/#pre-pulling-images
    pullPolicy: Always

  # -- Cosmo subgraph: gRPC/Connect on 4013, HTTP health on /healthz
  livenessProbe:
    enabled: true
    httpGet:
      path: /healthz
      port: 4013

  # -- define a readiness probe
  readinessProbe:
    enabled: true
    httpGet:
      path: /healthz
      port: 4013

  securityContext:
    readOnlyRootFilesystem: true

  volumes:
    - name: tmp
      mountPath: /tmp
      type: emptyDir

# ==============================================================================
# Service configuration (Cosmo Router connects via gRPC to port 4013)
service:
  type: ClusterIP
  ports:
    - name: grpc
      port: 4013
      appProtocol: grpc
      protocol: TCP
      public: true

# ==============================================================================
# Prometheus Operator ServiceMonitor configuration
monitoring:
  enabled: true

# ==============================================================================
# PodDisruptionBudget
podDisruptionBudget:
  enabled: false

# ==============================================================================
# NetworkPolicy
networkPolicy:
  enabled: false
