{{- if and .Values.store.elasticsearch.enabled .Values.store.elasticsearch.bootstrapElasticSecret }}
# Name/key match ECK bootstrap expectations for a fresh Elasticsearch. On an existing cluster,
# the operator may already own this Secret — reconcile with ECK before changing the password.
apiVersion: v1
kind: Secret
metadata:
  name: shop-elasticsearch-es-elastic-user
  annotations:
    argocd.argoproj.io/sync-wave: "0"
type: Opaque
stringData:
  elastic: {{ .Values.store.credentials.elasticsearchElasticPassword | quote }}
{{- end }}
