# Workflow persistence. Merge: values.yaml + cassandra.values.yaml + elasticsearch.values.yaml.
# Cassandra: shop-cassandra (k8ssandra-operator), CQL :9042 — Secret: templates/credentials-cassandra-secret.yaml.
temporal:
  server:
    config:
      persistence:
        datastores:
          default:
            cassandra:
              createDatabase: true
              manageSchema: true
              hosts: "shop-cassandra-shop-dc-service.k8ssandra-operator.svc.cluster.local"
              port: 9042
              keyspace: temporal
              user: shop-cassandra-superuser
              existingSecret: temporal-cassandra-secret
              secretKey: password
              # Single-node shop DC — RF must not exceed node count.
              replicationFactor: 1
