# Workflow persistence (Cassandra). Merge with values.yaml (+ elasticsearch.values.yaml):
#   helm install ... -f values.yaml -f cassandra.values.yaml -f elasticsearch.values.yaml
# Argo CD: list valueFiles in that order.
temporal:
  server:
    config:
      persistence:
        datastores:
          default:
            cassandra:
              createDatabase: true
              manageSchema: true
              hosts: "cassandra1.example.com,cassandra2.example.com"
              port: 9042
              keyspace: temporal
              user: cassandra_user
              # Option 1: password in values (chart creates a secret) — do not commit real passwords
              # password: your_password
              # Option 2: existing Secret (recommended for production)
              existingSecret: temporal-cassandra-secret
              secretKey: password
              replicationFactor: 3
