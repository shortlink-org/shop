# Must match Crunchy secret shortlink-postgres-pguser-temporal (user temporal) in shortlink-shop after PostgresCluster sync.
apiVersion: v1
kind: Secret
metadata:
  name: temporal-postgres-secret
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  password: {{ .Values.storeCredentials.temporalPostgresPassword | quote }}
