# Static credentials from values.storeCredentials (must match shop common store.credentials.elasticsearch).
apiVersion: v1
kind: Secret
metadata:
  name: temporal-elasticsearch-elastic-user
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  elastic: {{ .Values.storeCredentials.elasticsearchElasticPassword | quote }}
