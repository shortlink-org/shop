{{- if and .Values.grafanaDashboards .Values.grafanaDashboards.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.grafanaDashboards.configMapName | default "temporal-dashboard" }}
  namespace: {{ .Release.Namespace }}
  labels:
    grafana_dashboard: "true"
  annotations:
    grafana_dashboard_folder: {{ .Values.grafanaDashboards.folder | default "Temporal" | quote }}
data:
{{- range $key, $url := .Values.grafanaDashboards.dashboards }}
  {{ $key }}: {{ $url | quote }}
{{- end }}
{{- end }}
