# Common default values for temporal.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
# temporalPostgresPassword: must match Secret shop-postgres-pguser-temporal (key password) in shortlink-shop (Crunchy operator).
storeCredentials:
  temporalPostgresPassword: shortlink-dev-temporal

# ==============================================================================
# Grafana dashboards (Grafana sidecar: label grafana_dashboard + folder annotation).
# Same list as upstream Temporal Helm README — "Exploring Metrics via Grafana":
# https://github.com/temporalio/helm-charts/blob/main/README.md#exploring-metrics-via-grafana
# Pattern: ops/Helm/common/templates/store/grafana/postgres-dashboard.yaml (.json.url → raw JSON).
grafanaDashboards:
  enabled: true
  configMapName: temporal-dashboard
  folder: Temporal
  dashboards:
    "server-general-github.json.url": "https://raw.githubusercontent.com/temporalio/dashboards/helm/server/server-general.json"
    "sdk-general-github.json.url": "https://raw.githubusercontent.com/temporalio/dashboards/helm/sdk/sdk-general.json"
    "misc-advanced-visibility-specific-github.json.url": "https://raw.githubusercontent.com/temporalio/dashboards/helm/misc/advanced-visibility-specific.json"
    "misc-clustermonitoring-kubernetes-github.json.url": "https://raw.githubusercontent.com/temporalio/dashboards/helm/misc/clustermonitoring-kubernetes.json"
    "misc-frontend-service-specific-github.json.url": "https://raw.githubusercontent.com/temporalio/dashboards/helm/misc/frontend-service-specific.json"
    "misc-history-service-specific-github.json.url": "https://raw.githubusercontent.com/temporalio/dashboards/helm/misc/history-service-specific.json"
    "misc-matching-service-specific-github.json.url": "https://raw.githubusercontent.com/temporalio/dashboards/helm/misc/matching-service-specific.json"
    "misc-worker-service-specific-github.json.url": "https://raw.githubusercontent.com/temporalio/dashboards/helm/misc/worker-service-specific.json"

# ==============================================================================
# Deploy configuration (required for shortlink-template http_route)
deploy:
  type: Deployment

# ==============================================================================
# Service configuration (required for shortlink-template)
service:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      protocol: TCP
      public: true

# ==============================================================================
# Istio RequestAuthentication for JWT validation
# ref: https://istio.io/latest/docs/reference/config/security/request_authentication/
requestAuthentication:
  enabled: true
  issuer: "https://shortlink.best"
  jwksUri: "http://oathkeeper-api.auth.svc.cluster.local:4456/.well-known/jwks.json"
  forwardOriginalToken: true

# ==============================================================================
# Istio AuthorizationPolicy to require valid JWT
# ref: https://istio.io/latest/docs/reference/config/security/authorization-policy/
authorizationPolicy:
  enabled: true

# ==============================================================================
# HTTPRoute: Istio Gateway → Oathkeeper → Temporal Web UI
# ADR: https://github.com/shortlink-org/auth/blob/main/docs/ADR/decisions/0001-zero-trust-authentication-flow-browser-istio-oathkeeper-bff.md
httpRoute:
  enabled: true
  parentRefs:
    - name: external-gateway
      namespace: istio-ingress
      sectionName: https
  hostnames:
    - temporal.shortlink.best
  rules:
    # All routes through Oathkeeper for JWT validation
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: oathkeeper-proxy
          namespace: auth
          port: 4455

# ==============================================================================
temporal:
  enabled: true

  fullnameOverride: temporal

  serviceAccount:
    # Managed by wrapper chart template to avoid Helm hook side-effects
    create: false
    name: temporal

  server:
    replicaCount: 1

    # Disable Istio sidecar injection - Temporal uses plain gRPC without mTLS
    podAnnotations:
      sidecar.istio.io/inject: "false"

    # Resource configuration for Temporal server components
    # Requests are minimal for development, limits prevent runaway usage
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

    config:
      # Upstream chart >= 1.0.0-rc.2 no longer bundles Cassandra/Elasticsearch; configure external stores here.
      persistence:
        defaultStore: default
        visibilityStore: visibility
        numHistoryShards: 512
        # Datastores: postgres.values.yaml (default + visibility SQL) — merge with Helm / Argo CD.

    metrics:
      serviceMonitor:
        enabled: true

        additionalLabels:
          release: prometheus-operator

    frontend:
      metrics:
        serviceMonitor:
          enabled: true

    history:
      metrics:
        serviceMonitor:
          enabled: true

    matching:
      metrics:
        serviceMonitor:
          enabled: true

    worker:
      metrics:
        serviceMonitor:
          enabled: true

  web:
    # Disable Istio sidecar injection
    podAnnotations:
      sidecar.istio.io/inject: "false"

    # Resource configuration for Temporal Web UI
    resources:
      requests:
        cpu: "25m"
        memory: "64Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"

    # Disable built-in ingress - using Istio Gateway instead
    ingress:
      enabled: false

  # Compatibility shims for Temporal server 1.30+ images (see upstream chart values).
  shims:
    dockerize: false
    elasticsearchTool: false

# ==============================================================================
# Temporal Namespace Setup Job
# Creates application namespaces in Temporal after deployment
namespaceSetup:
  enabled: true

  # Temporal CLI image
  image:
    repository: temporalio/admin-tools
    tag: "1.30"
    pullPolicy: IfNotPresent

  # Temporal frontend address
  temporalAddress: "temporal-frontend:7233"

  # Service account (uses default if not specified)
  serviceAccountName: "temporal"

  # Namespaces to create
  namespaces:
    - name: oms
      description: "Order Management System workflows"
      retentionDays: 7
    - name: delivery
      description: "Delivery Service workflows"
      retentionDays: 7

  # Resource limits for the job
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"
