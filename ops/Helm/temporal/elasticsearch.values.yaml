# Visibility (ECK shop-elasticsearch). v8 = Temporal index schema version for ES 8+/9.
# Requires common store.elasticsearch.httpTlsDisabled: true for plain HTTP; otherwise use https + TLS/CA.
# Elastic user password Secret: templates/credentials-elasticsearch-elastic-secret.yaml
temporal:
  server:
    config:
      persistence:
        datastores:
          visibility:
            elasticsearch:
              version: v8
              url:
                scheme: http
                host: "shop-elasticsearch-es-http.shortlink-shop.svc.cluster.local:9200"
              username: elastic
              existingSecret: temporal-elasticsearch-elastic-user
              secretKey: elastic
              logLevel: error
              indices:
                visibility: temporal_visibility_v1
